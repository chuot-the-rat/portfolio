<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/starfruit.png" />
    <link rel="apple-touch-icon" href="/starfruit.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Primary meta -->
    <title>Leana Le — Product Designer</title>
    <meta name="description" content="Product designer with front-end chops, graduating BCIT 2026. Case studies in UX, UI, and shipped code.">
    <meta name="author" content="Leana Le">
    <meta name="theme-color" content="#faf9f7">

    <!-- Open Graph (LinkedIn, Slack, iMessage previews) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://leanale.com">
    <meta property="og:title" content="Leana Le — Product Designer">
    <meta property="og:description" content="Product designer with front-end chops, graduating BCIT 2026. Case studies in UX, UI, and shipped code.">
    <meta property="og:locale" content="en_CA">

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Leana Le — Product Designer">
    <meta name="twitter:description" content="Product designer with front-end chops, graduating BCIT 2026.">

    <!-- GitHub Pages SPA routing: restore path encoded by 404.html redirect -->
    <script>
      (function() {
        var p = window.location.search.slice(1);
        if (p.indexOf('p=') === 0) {
          var decoded = decodeURIComponent(p.slice(2));
          window.history.replaceState(null, null, decoded);
        }
      })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
